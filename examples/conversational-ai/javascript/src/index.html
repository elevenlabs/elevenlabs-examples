<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElevenLabs Conversational AI Demo</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>ElevenLabs Conversational AI Demo</h1>
            <p class="subtitle">Realtime voice conversation with selectable microphone and speaker devices.</p>
        </header>
        <div class="status-container">
            <div id="connectionStatus" class="status">Disconnected</div>
            <div id="speakingStatus" class="speaking-status">Agent Silent</div>
        </div>
        <div class="device-controls">
            <div class="device-control">
                <label for="inputDeviceSelect">Microphone</label>
                <select id="inputDeviceSelect" class="device-select">
                    <option value="">Default microphone</option>
                </select>
            </div>
            <div class="device-control">
                <label for="outputDeviceSelect">Speaker</label>
                <select id="outputDeviceSelect" class="device-select">
                    <option value="">Default speaker</option>
                </select>
                <p id="outputSupportNotice" class="support-note" aria-live="polite"></p>
            </div>
        </div>
        <div class="controls">
            <button id="startButton" class="button">Start Conversation</button>
            <button id="endButton" class="button" disabled>End Conversation</button>
        </div>
    </div>
    <script src="/static/bundle.js"></script>
</body>
</html>
